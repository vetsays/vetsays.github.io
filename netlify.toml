# Netlify build configuration for vetsays.
# Netlify runs the Eleventy build on every change and publishes the result.

[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "20"

# Friendly URL for the editor's login page.
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

# Sveltia / Decap CMS configuration.
# Paths below are relative to the repository root (the CMS commits straight to git).

backend:
  name: github
  repo: vetsays/vetsays.github.io
  branch: main
  # OAuth helper that lets GitHub login work on a static site.
  # Replace this with your deployed worker URL (see SETUP.md, step 3).
  base_url: https://REPLACE-WITH-YOUR-WORKER.workers.dev

# Where uploaded images are committed, and the URL they're served from.
media_folder: "src/assets/blog"
public_folder: "/assets/blog"

# Friendly site links shown inside the editor.
site_url: https://vetsays.github.io
display_url: https://vetsays.github.io
logo_url: https://vetsays.github.io/assets/vetsays-logo.jpeg

collections:
  - name: "blog"
    label: "Blog Posts"
    label_singular: "Blog Post"
    description: "Write and edit articles. Click 'New Blog Post' to start, then 'Publish'."
    folder: "src/blog"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    preview_path: "blog/{{slug}}/"
    sortable_fields: ["date", "title"]
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "The headline of your article."

      - label: "Publish date"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"
        hint: "Newest posts show first on the site."

      - label: "Category"
        name: "category"
        widget: "select"
        default: "Dogs"
        options:
          - "Dogs"
          - "Cats"
          - "Nutrition"
          - "Symptoms"
          - "Wellness"
          - "Behavior"
          - "For Students"

      - label: "Cover image"
        name: "cover"
        widget: "image"
        hint: "Shown at the top of the article and on the homepage card."

      - label: "Short summary"
        name: "excerpt"
        widget: "text"
        hint: "One or two sentences shown on the article card."

      - label: "Author"
        name: "author"
        widget: "string"
        default: "Dr. Rashmi Sonawane"

      - label: "Read time"
        name: "readTime"
        widget: "string"
        default: "5 min read"
        required: false
        hint: "For example: 5 min read."

      - label: "Body"
        name: "body"
        widget: "markdown"
        hint: "The article itself. Add headings, bold text, lists, and images here."
